# Requirement Decomposition Index

# v4.3: 功能组级拆分，迭代标识区分批次，设计文档完整溯源
# 使用说明：将 {{xxx}} 占位符替换为实际值

requirement_id: {{requirement_id}}
requirement_title: "{{requirement_title}}"
scenario: {{scenario}}  # "0-1" | "1-N" | "bugfix"
iteration_id: {{iteration_id}}
date: "{{YYYY-MM-DD}}"
status: decomposed
generated_at: "{{YYYY-MM-DD}}"
total_modules: {{module_count}}
total_stories: {{story_count}}
spec_ready_coverage: "100%"

decomposition_tree:
{{#each modules}}
  {{name}}:
{{#each stories}}
    - {{story_id}}   # {{title}}（功能组）
{{/each}}
{{/each}}

stories:
{{#each stories}}
  - story_id: {{story_id}}
    module: {{module}}
    functional_group: {{functional_group}}
    function: "{{function}}"
    title: "{{title}}"
    iteration_id: {{iteration_id}}
    date: "{{date}}"
    owner: {{owner}}
    responsibility: {{responsibility}}
    dependencies: [{{#each dependencies}}{{this}}{{#unless @last}}, {{/unless}}{{/each}}]
    path: ./stories/{{story_id}}
    spec_ready: true
{{/each}}
